services:
  minio:
    image: quay.io/minio/aistor/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./storage:/data
      - ./minio.license:/minio.license
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: Anhvan@1310
    command: server --console-address ":9001" /data --license /minio.license